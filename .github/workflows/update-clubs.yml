name: 🎉 Uppdatera nattklubbar

on:
  schedule:
    - cron: '0 10 1 * *'
  workflow_dispatch:
    inputs:
      cities:
        description: 'Städer att söka (kommaseparerade)'
        required: false
        default: 'Stockholm,Göteborg,Malmö'

jobs:
  update-nightclubs:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checka ut repo
        uses: actions/checkout@v4

      - name: 🐍 Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Installera beroenden
        run: pip install -r requirements.txt

      - name: 🤖 Kör nightclub-agenten
        run: python nightclub_agent.py "${{ github.event.inputs.cities || 'Stockholm,Göteborg,Malmö' }}"
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      - name: 💾 Spara artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightclubs-data
          path: |
            nightclubs.json
            nightclubs_master.json
          retention-days: 90

      - name: 📤 Commita båda JSON-filerna till repot
        run: |
          git config --global user.name "PartyPrep Bot"
          git config --global user.email "bot@partyprep.se"
          git add nightclubs.json nightclubs_master.json
          git diff --staged --quiet || git commit -m "🎉 Auto-uppdatering $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
